<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Inline Challenge</title>
        <style>
            body{
                width: 100%;
                padding: 1rem;
            }
            header, main, footer{
                width: 95%;
                min-height: 300px;
                display: flex;
                justify-content: center;
                align-items: center;
            }
        </style>
    </head>

    <body style="background-color: gray;">
        <header style="background-color: aqua; color: gray;">
            <h1>HEADER</h1>
        </header>
        <main style="background-color: white; height: 400px; margin: 1rem; width: 90%; color: aqua">
            <h2 style="font-size: 300px;">MAIN</h2>
        </main>
        <footer style="background-color: aqua; color: gray;">
            <h3>FOOTER</h3>
        </footer>
    </body>
</html>
