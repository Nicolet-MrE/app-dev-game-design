<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collider Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-container">
        <section id="score-container">
            <h3>Level</h3>
            <h2 id="level">1</h2>
            <h3>Score</h3>
            <h2 id="score">0</h2>
        </section>
        <section id="game-container">
            <h1>Dodge Blocks</h1>
            <div id="gameboard" class="board-play paused"></div>
            <h2 id="message"> Press Start </h2>
        </section>
        <section id="buttons">
                <button id="start">Start</button>
                <button id="restart">Restart</button>
        </section>
    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
